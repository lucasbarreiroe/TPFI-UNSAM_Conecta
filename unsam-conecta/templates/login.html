{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center text-primary mb-4">Iniciar Sesión</h3>
                
                <div id="alert-box" class="alert d-none"></div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// NUEVO: Escuchar si venimos redirigidos desde el link del correo electrónico
document.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("verified") === "true") {
        const alertBox = document.getElementById("alert-box");
        alertBox.className = "alert alert-success d-block mb-3";
        alertBox.innerText = "¡Tu correo ha sido verificado! Ya puedes iniciar sesión.";
    }
});

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById("alert-box");
    
    const formData = new URLSearchParams();
    formData.append("username", document.getElementById("email").value);
    formData.append("password", document.getElementById("password").value);

    try {
        const response = await fetch("/api/v1/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: formData
        });

        if (response.ok) {
            const data = await response.json();
            localStorage.setItem("token", data.access_token);
            window.location.href = "/eventos";
        } else {
            const error = await response.json();
            alertBox.className = "alert alert-danger d-block mb-3";
            // NUEVO: Ahora extrae el mensaje del backend (ej: "Por favor, revisa tu correo...")
            alertBox.innerText = error.detail || "Correo o contraseña incorrectos";
        }
    } catch (error) {
        console.error("Error:", error);
    }
});
</script>
{% endblock %}
