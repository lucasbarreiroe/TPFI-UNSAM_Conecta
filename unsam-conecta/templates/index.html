{% extends "base.html" %}

{% block title %}Inicio - {{ title }}{% endblock %}

{% block content %}
<div class="p-5 mb-4 bg-white rounded-3 shadow-sm border">
    <div class="container-fluid py-5 text-center">
        <h1 class="display-5 fw-bold text-primary">Bienvenido a {{ title }}</h1>
        <p class="col-md-8 fs-4 mx-auto">La plataforma oficial para descubrir, organizar y participar en eventos académicos, workshops y seminarios de la comunidad universitaria.</p>

    </div>
</div>
{% endblock %}
