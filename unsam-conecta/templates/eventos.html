{% extends "base.html" %}
{% block content %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary" id="page-title">Cargando eventos...</h2>
</div>

<div id="alert-box" class="alert d-none"></div>

<div class="text-center" id="loading-spinner">
    <div class="spinner-border text-primary" role="status"></div>
</div>

<div class="row d-none" id="public-view"></div>

<div id="student-view" class="d-none">
    
    <div id="recommendations-section" class="mb-5 d-none">
        <h4 class="text-success fw-bold mb-3">⭐ Recomendados para vos</h4>
        <div class="row" id="recommendations-container">
            </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <div id="calendar"></div>
        </div>
    </div>
</div>

<div id="organizer-view" class="d-none">
    <div class="d-flex justify-content-end mb-3">
        <a href="/crear-evento" class="btn btn-success">+ Publicar Nuevo Evento</a>
    </div>
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Título</th>
                        <th>Categoría</th>
                        <th>Fecha</th>
                        <th>Cupos Ocupados</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="organizer-table-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="eventModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalTitle">Detalles del Evento</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <span class="badge bg-secondary mb-2" id="modalCategory"></span>
        <p class="text-muted" id="modalDescription"></p>
        <hr>
        <p class="mb-1"><strong>📍 Lugar:</strong> <span id="modalLocation"></span></p>
        <p class="mb-1"><strong>📅 Inicio:</strong> <span id="modalStart"></span></p>
        <p class="mb-1"><strong>👥 Cupos:</strong> <span id="modalCapacity"></span></p>
      </div>
      <div class="modal-footer" id="modalFooter">
        </div>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let misInscripciones = new Set();
let allEvents = [];
let misRecomendaciones = []; 

document.addEventListener("DOMContentLoaded", async () => {
    const token = localStorage.getItem("token");

    try {
        if (token) {
            const meRes = await fetch("/api/v1/auth/me", {
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (meRes.ok) {
                currentUser = await meRes.json();
            } else {
                localStorage.removeItem("token");
            }
        }

        const responseEvents = await fetch("/api/v1/events/");
        allEvents = await responseEvents.json();

        document.getElementById("loading-spinner").className = "d-none";

        if (!currentUser) {
            renderPublicView();
        } else if (currentUser.role === 'ORGANIZER') {
            renderOrganizerView();
        } else {
            await fetchMisInscripciones(token);
            await fetchRecomendaciones(token); 
            renderStudentView();
        }

    } catch (error) {
        console.error(error);
        document.getElementById("alert-box").className = "alert alert-danger";
        document.getElementById("alert-box").innerText = "Error de conexión con el servidor.";
    }
});

// -------------------------------------------------------------
// FUNCIONES DE RENDERIZADO POR ROL
// -------------------------------------------------------------

function renderPublicView() {
    document.getElementById("page-title").innerText = "Cartelera de Eventos";
    const container = document.getElementById("public-view");
    container.classList.remove("d-none");

    if (allEvents.length === 0) {
        container.innerHTML = "<p class='text-muted'>No hay eventos programados.</p>";
        return;
    }

    allEvents.forEach(event => {
        const fecha = new Date(event.start_time).toLocaleDateString("es-AR");
        container.innerHTML += `
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <span class="badge bg-secondary mb-2">${event.category}</span>
                        <h5 class="card-title text-primary">${event.title}</h5>
                        <p class="card-text text-muted small">${event.description.substring(0, 80)}...</p>
                        <p class="mb-1"><strong>📅 Fecha:</strong> ${fecha}</p>
                        <a href="/login" class="btn btn-outline-primary w-100 mt-3">Inicia sesión para anotarte</a>
                    </div>
                </div>
            </div>`;
    });
}

function renderOrganizerView() {
    document.getElementById("page-title").innerText = "Panel de Administración de Eventos";
    const container = document.getElementById("organizer-view");
    const tbody = document.getElementById("organizer-table-body");
    container.classList.remove("d-none");

    const misEventos = allEvents.filter(e => e.organizer_id === currentUser.id);

    if (misEventos.length === 0) {
        tbody.innerHTML = "<tr><td colspan='5' class='text-center text-muted'>Aún no has publicado ningún evento.</td></tr>";
        return;
    }

    misEventos.forEach(event => {
        const fecha = new Date(event.start_time).toLocaleDateString("es-AR", { dateStyle: "medium" });
        tbody.innerHTML += `
            <tr>
                <td class="fw-bold text-primary">${event.title}</td>
                <td><span class="badge bg-info text-dark">${event.category}</span></td>
                <td>${fecha}</td>
                <td>
                    <div class="progress" style="height: 20px;">
                        <div class="progress-bar" role="progressbar" style="width: ${(event.current_enrollment/event.capacity)*100}%">
                            ${event.current_enrollment} / ${event.capacity}
                        </div>
                    </div>
                </td>
                <td>
                    <button class="btn btn-sm btn-outline-danger" onclick="eliminarEvento(${event.id})">Eliminar</button>
                    <button class="btn btn-sm btn-outline-secondary disabled" title="Próximamente">Editar</button>
                </td>
            </tr>`;
    });
}

function renderStudentView() {
    document.getElementById("page-title").innerText = "Calendario Académico";
    document.getElementById("student-view").classList.remove("d-none");

    // 1. RENDERIZAR RECOMENDACIONES SI EXISTEN
    const recSection = document.getElementById("recommendations-section");
    const recContainer = document.getElementById("recommendations-container");
    
    if (misRecomendaciones.length > 0) {
        recSection.classList.remove("d-none");
        recContainer.innerHTML = "";
        
        misRecomendaciones.filter(event => !misInscripciones.has(event.id)).slice(0, 3).forEach(event => {
            const fecha = new Date(event.start_time).toLocaleDateString("es-AR", { dateStyle: "medium" });
            recContainer.innerHTML += `
                <div class="col-md-4 mb-3">
                    <div class="card h-100 border-success shadow-sm" style="cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'" onclick="abrirModalPorId(${event.id})">
                        <div class="card-body">
                            <span class="badge bg-success mb-2">Recomendado</span>
                            <span class="badge bg-secondary mb-2">${event.category}</span>
                            <h5 class="card-title text-success">${event.title}</h5>
                            <p class="card-text text-muted small">${event.description.substring(0, 60)}...</p>
                            <p class="mb-0 small fw-bold">📅 ${fecha}</p>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // 2. RENDERIZAR CALENDARIO NORMAL
    const calendarEl = document.getElementById('calendar');
    
    const calendarEvents = allEvents.map(e => ({
        id: e.id,
        title: e.title,
        start: e.start_time,
        end: e.end_time,
        backgroundColor: misInscripciones.has(e.id) ? "#198754" : "#0d6efd",
        extendedProps: e
    }));

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,listWeek'
        },
        buttonText: { today: 'Hoy', month: 'Mes', week: 'Semana', list: 'Agenda' },
        events: calendarEvents,

        // ==========================================
        // NUEVAS CONFIGURACIONES DE UI/UX PARA EVENTOS
        // ==========================================
        nextDayThreshold: '06:00:00', // Evita que un evento de trasnoche ocupe todo el casillero del día siguiente
        eventDisplay: 'list-item',    // Cambia el bloque sólido por un punto limpio y texto
        displayEventEnd: false,       // Oculta la hora de finalización en la grilla para que no se corte
        eventTimeFormat: {            // Formato de hora limpio a 24hs (Ej: 14:30)
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        },
        // ==========================================

        eventClick: function(info) {
            abrirModalEvento(info.event.extendedProps);
        }
    });
    
    calendar.render();
}

// -------------------------------------------------------------
// LÓGICA DE DATOS (ALUMNOS)
// -------------------------------------------------------------

async function fetchMisInscripciones(token) {
    const response = await fetch("/api/v1/users/me/registrations", {
        headers: { "Authorization": `Bearer ${token}` }
    });
    if (response.ok) {
        const regs = await response.json();
        regs.forEach(reg => {
            if (reg.status === "CONFIRMED") misInscripciones.add(reg.event_id);
        });
    }
}

async function fetchRecomendaciones(token) {
    try {
        const response = await fetch("/api/v1/recommendations/me/recommendations", {
            headers: { "Authorization": `Bearer ${token}` }
        });
        if (response.ok) {
            misRecomendaciones = await response.json();
        }
    } catch (error) {
        console.error("Error al obtener recomendaciones:", error);
    }
}

window.abrirModalPorId = function(eventId) {
    const event = allEvents.find(e => e.id === eventId);
    if (event) abrirModalEvento(event);
}

function abrirModalEvento(event) {
    document.getElementById("modalTitle").innerText = event.title;
    document.getElementById("modalCategory").innerText = event.category;
    document.getElementById("modalDescription").innerText = event.description;
    document.getElementById("modalLocation").innerText = event.location;
    document.getElementById("modalStart").innerText = new Date(event.start_time).toLocaleString("es-AR");
    document.getElementById("modalCapacity").innerText = `${event.current_enrollment} / ${event.capacity}`;

    const footer = document.getElementById("modalFooter");
    if (misInscripciones.has(event.id)) {
        footer.innerHTML = `<button class="btn btn-danger w-100" onclick="procesarInscripcion(${event.id}, 'cancel')">Desinscribirse</button>`;
    } else if (event.current_enrollment >= event.capacity) {
        footer.innerHTML = `<button class="btn btn-secondary w-100 disabled">Cupos Agotados</button>`;
    } else {
        footer.innerHTML = `<button class="btn btn-success w-100" onclick="procesarInscripcion(${event.id}, 'register')">Inscribirse</button>`;
    }

    const modal = new bootstrap.Modal(document.getElementById('eventModal'));
    modal.show();
}

async function procesarInscripcion(eventId, action) {
    const token = localStorage.getItem("token");
    try {
        const response = await fetch(`/api/v1/events/${eventId}/${action}`, {
            method: "POST",
            headers: { "Authorization": `Bearer ${token}` }
        });
        if (response.ok) {
            window.location.reload();
        } else {
            const err = await response.json();
            alert("Error: " + err.detail);
        }
    } catch (error) {
        console.error(error);
    }
}

// -------------------------------------------------------------
// LÓGICA DE ORGANIZADOR
// -------------------------------------------------------------

async function eliminarEvento(eventId) {
    if(!confirm("¿ESTÁS SEGURO? Esta acción eliminará el evento y borrará a todos los inscriptos.")) return;
    
    const token = localStorage.getItem("token");
    try {
        const response = await fetch(`/api/v1/events/${eventId}`, {
            method: "DELETE",
            headers: { "Authorization": `Bearer ${token}` }
        });
        
        if (response.ok || response.status === 204) {
            window.location.reload();
        } else {
            const err = await response.json();
            alert("Error al eliminar: " + err.detail);
        }
    } catch (error) {
        console.error(error);
    }
}
</script>
{% endblock %}
