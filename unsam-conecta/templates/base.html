<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UNSAM Conecta{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">UNSAM Conecta</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="dynamic-nav">
                    </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center text-muted py-4">
        <p>&copy; 2026 Universidad Nacional de San Martín - Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem("token");
            const nav = document.getElementById("dynamic-nav");

            function renderNav(linksHtml) {
                nav.innerHTML = `
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    ${linksHtml}
                `;
            }

            if (token) {
                try {
                    // Preguntamos al backend el ROL del usuario
                    const res = await fetch("/api/v1/auth/me", {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    
                    if (res.ok) {
                        const user = await res.json();
                        let customLinks = "";
                        
                        // Si es Unidad Académica:
                        if (user.role === 'ORGANIZER' || user.role === 'ADMIN') {
                            customLinks += `
                                <li class="nav-item"><a class="nav-link" href="/eventos">Mis Eventos Publicados</a></li>
                                <li class="nav-item"><a class="nav-link" href="/crear-evento">Crear Evento</a></li>
                            `;
                        } else {
                            // Si es Alumno:
                            customLinks += `
                                <li class="nav-item"><a class="nav-link" href="/eventos">Cartelera de Eventos</a></li>
                                <li class="nav-item"><a class="nav-link" href="/mis-inscripciones">Mis Inscripciones</a></li>
                            `;
                        }
                        
                        customLinks += `<li class="nav-item"><a class="nav-link btn btn-danger text-white ms-2" href="#" onclick="logout()">Cerrar Sesión</a></li>`;
                        renderNav(customLinks);
                    } else {
                        localStorage.removeItem("token");
                        renderNav(getGuestLinks());
                    }
                } catch (error) {
                    renderNav(getGuestLinks());
                }
            } else {
                renderNav(getGuestLinks());
            }

            function getGuestLinks() {
                return `
                    <li class="nav-item"><a class="nav-link" href="/eventos">Eventos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/registro">Registrarse</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-light text-primary ms-2" href="/login">Iniciar Sesión</a></li>
                `;
            }
        });

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/";
        }
    </script>
</body>
</html>
